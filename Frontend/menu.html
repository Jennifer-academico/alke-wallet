<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú - Alke Wallet</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="contenedor-pagina">

    <img src="img/logo.png" alt="Alke Wallet" class="logo mb-3">

    <h2>Menú Principal</h2>
    <h4>Saldo disponible: $<span id="saldo">0</span></h4>

    <div id="alert-container" class="mb-3"></div>

    <button id="btnDepositar" class="btn btn-success w-100 mb-2">Depositar</button>
    <button id="btnEnviar" class="btn btn-danger w-100 mb-2">Enviar dinero</button>
    <button id="btnMovimientos" class="btn btn-secondary w-100">Últimos movimientos</button>

  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/menu.js"></script>

</body>
</html>
