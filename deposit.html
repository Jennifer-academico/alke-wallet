<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depositar - Alke Wallet</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="contenedor-pagina">

    <h2>Depositar</h2>
    <h4>Saldo disponible: $<span id="saldo">0</span></h4>

    <form id="depositForm">
      <div class="mb-3">
        <label for="monto">Monto a depositar</label>
        <input type="number" id="monto" class="form-control" placeholder="Ej: 10000">
      </div>
      <button type="submit" class="btn-verde">Depositar</button>
    </form>

    <div id="alert-container" class="mt-3"></div>

    <a href="menu.html" class="btn btn-secondary w-100 mt-3">Volver al menú</a>

  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
