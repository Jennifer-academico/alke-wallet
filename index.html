<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="card-login">

    <img src="img/logo.png" alt="Alke Wallet" class="logo">

    <h3 class="titulo">Alke Wallet</h3>
    <p class="slogan">Tu dinero, donde lo necesitas</p>

    <form id="loginForm">
      <div class="mb-3">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.com">
      </div>
      <div class="mb-3">
        <label for="password">Contraseña</label>
        <input type="password" id="password" class="form-control" placeholder="Ingresa tu contraseña">
      </div>
      <button type="submit" class="btn-verde">Iniciar sesión</button>
    </form>

    <div id="alert-container" class="mt-3"></div>

  </div>

  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
